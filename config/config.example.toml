dataset = "j14i/voice-memories"
audio_prefer = "original"
languages = ["pl", "en", "es"]

[sync]
interval_seconds = 900
min_duration_seconds = 1.0
submit_delay_seconds = 3.0
lazy_start = true
max_per_sync = 5
keep_audio = false
keep_shards = false

[modes]
pl = "lazy-note-pl"
en = "lazy-note-en"
es = "lazy-note-es"
auto = "lazy-note-auto"
fallback = "lazy-note-auto"

[model]
voice_model_id = "sw-elevenlabs-scribe"
language_model_id = "claude-sonnet-4-6"

[model.pl]
language_model_id = "claude-sonnet-4-6"

[prompts.pl]
file = "prompts/note.pl.md"

[prompts.en]
file = "prompts/note.en.md"

[prompts.es]
file = "prompts/note.es.md"

[prompts.auto]
file = "prompts/note.auto.md"

[publish]
enabled = true
notes_dir = "~/.local/share/lazy-notes/notes"
memo_enabled = true
memo_folder = "Lazy Notes"
memo_bin = "memo"
tag = "#lazy-notes"
